<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Rural</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Turismo Rural</h1>
        <nav>
            <a href="#sobre">Sobre</a>
            <a href="#destinos">Destinos</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

    <main>
        <section id="sobre">
            <h2>Sobre o Turismo Rural</h2>
            <p>O turismo rural oferece experiências únicas no campo, permitindo contato com a natureza, cultura local e atividades agrícolas.</p>
        </section>

        <section id="destinos">
            <h2>Destinos Populares</h2>
            <div class="card" id="destinos-card">
                <!-- Os destinos serão adicionados pelo JavaScript -->
            </div>
        </section>

        <section id="contato">
            <h2>Contato</h2>
            <form id="contato-form">
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea><br><br>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Turismo Rural. Todos os direitos reservados.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
